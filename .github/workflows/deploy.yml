name: Deploy to Oracle VM

on:
  push:
    branches:
      - main

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_pipeline
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:

      # ── Checkout code ──────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Set up Python ──────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── Install dependencies ───────────────────────
      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      # ── Run tests ──────────────────────────────────
      - name: Run tests
        run: |
          python tests/run_tests.py
        env:
          PYTHONPATH: .
          DATABASE_URL: postgresql://postgres:postgres@localhost/test_pipeline

      # ── Deploy exact validated commit to Oracle VM ─
      - name: Deploy to Oracle VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:        ${{ secrets.VM_HOST }}
          username:    ${{ secrets.VM_USER }}
          key:         ${{ secrets.VM_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.VM_PATH }}

            echo "[1/8] Upgrading pip..."
            source venv/bin/activate
            pip install --upgrade pip --quiet
            python --version

            echo "[2/8] Fetching latest code..."
            git fetch --all
            PREVIOUS_SHA=$(git rev-parse HEAD)

            echo "[3/8] Checking out exact validated commit..."
            git checkout -B main ${{ github.sha }}

            echo "[4/8] Installing dependencies..."
            pip install -r requirements.txt --quiet

            echo "[5/8] Verifying PostgreSQL connection..."

            python - <<'PY'
            import sys
            sys.path.insert(0, '.')
            from dotenv import load_dotenv
            load_dotenv('.env')   # explicit path — find_dotenv() fails on stdin
            from db.connection import get_conn
            conn = get_conn()
            row = conn.execute("SELECT COUNT(*) AS cnt FROM prospective_companies").fetchone()
            print(f"[OK] PostgreSQL OK — prospective_companies has {row['cnt']} rows")
            conn.close()
            PY

            echo "[6/8] Syncing systemd unit files..."
            sudo /usr/local/bin/install-pipeline-units
            echo "  systemd unit files installed"
            sudo systemctl daemon-reload
            echo "  systemd daemon reloaded"

            echo "[7/8] Restarting services..."
            for svc in recruiter-scheduler recruiter-watchdog; do
              if ! systemctl cat "$svc" &>/dev/null; then
                echo "[ERROR] $svc unit not found after systemd sync — check deploy/systemd/"
                exit 1
              fi
              sudo systemctl restart "$svc"
            done

            echo "[8/8] Verifying services are active..."
            sleep 3   # brief settle: systemctl restart returns once the process starts, not fully active
            for svc in recruiter-scheduler recruiter-watchdog; do
              if ! systemctl is-active --quiet "$svc"; then
                echo "[ERROR] $svc failed to start after restart:"
                journalctl -u "$svc" -n 30 --no-pager || true
                exit 1
              fi
              echo "[OK] $svc is active"
            done

            echo "  Running health check to verify pipeline state..."
            sleep 70   # fullscan_worker writes heartbeat every 60s — wait at least that long
            source venv/bin/activate
            if ! python scripts/health_check.py; then
              echo "[ERROR] Health check failed — rolling back to $PREVIOUS_SHA"
              if ! git checkout -B main "$PREVIOUS_SHA"; then
                echo "[FATAL] git checkout to $PREVIOUS_SHA failed — repository may be in a dirty state"
                echo "[FATAL] Manual intervention required: git checkout main && git reset --hard $PREVIOUS_SHA"
                exit 1
              fi
              if ! pip install -r requirements.txt --quiet; then
                echo "[FATAL] pip install failed during rollback — venv may be corrupted"
                echo "[FATAL] Manual intervention required: deactivate && rm -rf venv && python -m venv venv && pip install -r requirements.txt"
                exit 1
              fi

              echo "[ROLLBACK] Re-syncing systemd unit files from previous revision..."
              sudo /usr/local/bin/install-pipeline-units
              echo "  systemd unit files installed"
              sudo systemctl daemon-reload

              echo "[ROLLBACK] Restarting services..."
              for svc in recruiter-scheduler recruiter-watchdog; do
                sudo systemctl restart "$svc"
              done

              echo "[ROLLBACK] Verifying rollback services are active..."
              sleep 3
              for svc in recruiter-scheduler recruiter-watchdog; do
                if ! systemctl is-active --quiet "$svc"; then
                  echo "[ERROR] $svc failed to start after rollback:"
                  journalctl -u "$svc" -n 30 --no-pager || true
                  echo "[FATAL] Rollback failed — manual intervention required"
                  exit 1
                fi
                echo "[OK] $svc is active after rollback"
              done

              echo "[ROLLBACK] Re-running health check to confirm pipeline is healthy..."
              sleep 70
              if ! python scripts/health_check.py; then
                echo "[FATAL] Health check still failing after rollback to $PREVIOUS_SHA"
                echo "[FATAL] Pipeline is unhealthy — manual intervention required"
                exit 1
              fi
              echo "[ROLLBACK] Health check passed"

              echo "[ROLLBACK] Complete — reverted to $PREVIOUS_SHA"
              exit 1
            fi

            echo "Deploy complete ✓"
            echo "Deployed commit: ${{ github.sha }}"
            echo "Deployed at: $(date)"
