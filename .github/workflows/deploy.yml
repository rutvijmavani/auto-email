name: Deploy to Oracle VM

on:
  push:
    branches:
      - main

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_pipeline
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:

      # ── Checkout code ──────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Set up Python ──────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── Install dependencies ───────────────────────
      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      # ── Run tests ──────────────────────────────────
      - name: Run tests
        run: |
          python tests/run_tests.py
        env:
          PYTHONPATH: .
          DATABASE_URL: postgresql://postgres:postgres@localhost/test_pipeline

      # ── Deploy exact validated commit to Oracle VM ─
      - name: Deploy to Oracle VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:        ${{ secrets.VM_HOST }}
          username:    ${{ secrets.VM_USER }}
          key:         ${{ secrets.VM_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.VM_PATH }}

            echo "[1/6] Upgrading pip..."
            source venv/bin/activate
            pip install --upgrade pip --quiet
            python --version

            echo "[2/6] Fetching latest code..."
            git fetch --all
            git config advice.detachedHead false

            echo "[3/6] Checking out exact validated commit..."
            git reset --hard HEAD
            git checkout ${{ github.sha }}

            echo "[4/6] Installing dependencies..."
            pip install -r requirements.txt --quiet

            echo "[5/6] Verifying PostgreSQL connection..."
            
            python - <<'PY'
            import sys
            sys.path.insert(0, '.')
            from dotenv import load_dotenv
            load_dotenv('.env')   # explicit path — find_dotenv() fails on stdin
            from db.connection import get_conn
            conn = get_conn()
            row = conn.execute("SELECT COUNT(*) AS cnt FROM prospective_companies").fetchone()
            print(f"[OK] PostgreSQL OK — prospective_companies has {row['cnt']} rows")
            conn.close()
            PY

            echo "[6/6] Deploy complete ✓"
            echo "Deployed commit: ${{ github.sha }}"
            echo "Deployed at: $(date)"