name: Deploy to Oracle VM

on:
  push:
    branches:
      - main

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_pipeline
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:

      # ── Checkout code ──────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Set up Python ──────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── Install dependencies ───────────────────────
      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      # ── Run tests ──────────────────────────────────
      - name: Run tests
        run: |
          python tests/run_tests.py
        env:
          PYTHONPATH: .
          DATABASE_URL: postgresql://postgres:postgres@localhost/test_pipeline

      # ── Deploy exact validated commit to Oracle VM ─
      - name: Deploy to Oracle VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:        ${{ secrets.VM_HOST }}
          username:    ${{ secrets.VM_USER }}
          key:         ${{ secrets.VM_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.VM_PATH }}

            echo "[1/8] Upgrading pip..."
            source venv/bin/activate
            pip install --upgrade pip --quiet
            python --version

            echo "[2/8] Fetching latest code..."
            git fetch --all
            PREVIOUS_SHA=$(git rev-parse HEAD)

            echo "[3/8] Checking out exact validated commit..."
            git checkout -B main ${{ github.sha }}

            echo "[4/8] Installing dependencies..."
            pip install -r requirements.txt --quiet

            echo "[5/8] Verifying PostgreSQL connection..."

            python - <<'PY'
            import sys
            sys.path.insert(0, '.')
            from dotenv import load_dotenv
            load_dotenv('.env')   # explicit path — find_dotenv() fails on stdin
            from db.connection import get_conn
            conn = get_conn()
            row = conn.execute("SELECT COUNT(*) AS cnt FROM prospective_companies").fetchone()
            print(f"[OK] PostgreSQL OK — prospective_companies has {row['cnt']} rows")
            conn.close()
            PY

            echo "[6/8] Syncing systemd unit files..."
            for unit_file in ${{ secrets.VM_PATH }}/deploy/systemd/*.service; do
              unit_name=$(basename "$unit_file")
              sed "s|User=opc|User=${{ secrets.VM_USER }}|g; s|Group=opc|Group=${{ secrets.VM_USER }}|g; s|/home/opc/mail|${{ secrets.VM_PATH }}|g" \
                "$unit_file" | sudo tee /etc/systemd/system/"$unit_name" > /dev/null
              echo "  Installed: $unit_name"
            done
            sudo systemctl daemon-reload
            echo "  systemd daemon reloaded"

            echo "[7/8] Restarting services..."
            for svc in recruiter-scheduler recruiter-watchdog; do
              if ! systemctl cat "$svc" &>/dev/null; then
                echo "[ERROR] $svc unit not found after systemd sync — check deploy/systemd/"
                exit 1
              fi
              sudo systemctl restart "$svc"
            done

            echo "[8/8] Verifying services are active..."
            for svc in recruiter-scheduler recruiter-watchdog; do
              if ! systemctl is-active --quiet "$svc"; then
                echo "[ERROR] $svc failed to start after restart:"
                journalctl -u "$svc" -n 30 --no-pager || true
                exit 1
              fi
              echo "[OK] $svc is active"
            done

            echo "  Running health check to verify pipeline state..."
            sleep 70   # fullscan_worker writes heartbeat every 60s — wait at least that long
            source venv/bin/activate
            if ! python scripts/health_check.py; then
              echo "[ERROR] Health check failed — rolling back to $PREVIOUS_SHA"
              git checkout -B main "$PREVIOUS_SHA"
              pip install -r requirements.txt --quiet
              for svc in recruiter-scheduler recruiter-watchdog; do
                sudo systemctl restart "$svc" || true
              done
              echo "[ROLLBACK] Services restarted on previous commit $PREVIOUS_SHA"
              exit 1
            fi

            echo "Deploy complete ✓"
            echo "Deployed commit: ${{ github.sha }}"
            echo "Deployed at: $(date)"
