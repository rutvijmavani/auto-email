name: Deploy to Oracle VM

on:
  push:
    branches:
      - main

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    steps:

      # ── Checkout code ──────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Set up Python ──────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── Install dependencies ───────────────────────
      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      # ── Run tests ──────────────────────────────────
      - name: Run tests
        run: |
          python tests/run_tests.py
        env:
          PYTHONPATH: .

      # ── Deploy exact validated commit to Oracle VM ─
      # Uses GITHUB_SHA to deploy the exact commit
      # that passed tests — not the moving main ref
      - name: Deploy to Oracle VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:        ${{ secrets.VM_HOST }}
          username:    ${{ secrets.VM_USER }}
          key:         ${{ secrets.VM_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.VM_PATH }}

            echo "[1/4] Fetching latest code..."
            git fetch --all

            echo "[2/4] Checking out exact validated commit..."
            git checkout ${{ github.sha }}

            echo "[3/4] Installing dependencies..."
            source venv/bin/activate
            pip install -r requirements.txt --quiet

            echo "[4/4] Deploy complete ✓"
            echo "Deployed commit: ${{ github.sha }}"
            echo "Deployed at: $(date)"